<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Hiring App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#3b82f6,#9333ea,#ec4899);
  min-height: 100vh;
  padding: 20px;
}

header {
  text-align: center;
  color: white;
  margin-bottom: 30px;
}

.search-box {
  text-align: center;
  margin-bottom: 30px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
  margin-bottom:10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(to right,#3b82f6,#9333ea);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* ICON BUTTON */
.icon-btn {
  font-size: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 300px;
  text-align:center;
}

.options {
  text-align:left;
  margin:10px 0;
}

footer {
  text-align: center;
  color: white;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
<h1>Employee Hiring App</h1>
<p>Find your dream job quickly and easily</p>
</header>

<div class="search-box">
<input type="text" placeholder="Search jobs...">
</div>

<div class="grid" id="jobList"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>Apply for Job</h3>

<input placeholder="Your Name"><br>
<input placeholder="Your Email"><br>

<div class="options">
<label>
<input type="radio" name="jobtype" value="Full-Time"> Full-Time
</label><br>

<label>
<input type="radio" name="jobtype" value="Part-Time"> Part-Time
</label><br>

<label>
<input type="radio" name="jobtype" value="Remote"> Remote
</label>
</div>

<!-- SUBMIT ICON -->
<button class="icon-btn" onclick="submitForm()">
✔️
</button>

<button onclick="closeModal()" style="background:gray;margin-top:5px;">
✖️
</button>

</div>
</div>

<footer>
© 2026 Employee Hiring App
</footer>

<script>

const jobs = [
{
title:"Frontend Developer",
company:"Tech Solutions",
image:"https://images.unsplash.com/photo-1518770660439-4636190af475?w=600"
},
{
title:"Marketing Manager",
company:"Bright Ads",
image:"https://images.unsplash.com/photo-1557838923-2985c318be48?w=600"
},
{
title:"Customer Support",
company:"HelpDesk Pro",
image:"https://images.unsplash.com/photo-1521791136064-7986c2920216?w=600"
},
{
title:"UI/UX Designer",
company:"Creative Studio",
image:"https://images.unsplash.com/photo-1558655146-d09347e92766?w=600"
},
{
title:"Data Analyst",
company:"Data Insights",
image:"https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600"
},
{
title:"Sales Manager",
company:"Global Sales Co.",
image:"https://images.unsplash.com/photo-1556745757-8d76bdb6984b?w=600"
}
];

const jobList = document.getElementById("jobList");

function renderJobs() {
jobList.innerHTML="";

jobs.forEach(job=>{
jobList.innerHTML += `
<div class="card">
<img src="${job.image}">
<div class="card-content">
<h3>${job.title}</h3>
<p>${job.company}</p>

<button class="icon-btn" onclick="openModal()">
📩
</button>

</div>
</div>
`;
});
}

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function submitForm(){
closeModal();
setTimeout(()=>{
alert("Your application will be reviewed ❤️");
},300);
}

renderJobs();

</script>

</body>
</html>
